services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3008:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    environment:
      API_URL: http://backend:8000
      INTERNAL_API_SECRET: change-me-in-production
      DATABASE_URL: postgresql://unefy:unefy@postgres:5432/unefy
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8008:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://unefy:unefy@postgres:5432/unefy
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    #ports:
    #  - "5432:5432"
    environment:
      POSTGRES_USER: unefy
      POSTGRES_PASSWORD: unefy
      POSTGRES_DB: unefy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unefy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    #ports:
    #  - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  backend_venv:
  web_node_modules:
  web_next:
